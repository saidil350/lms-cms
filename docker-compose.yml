services:
  cms:
    build:
      context: .
      args:
        PAYLOAD_SECRET: local_dev_secret_change_in_production
        DATABASE_URI: postgresql://lms:lmspass@db:5432/lms_cms
        PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3001
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URI: postgresql://lms:lmspass@db:5432/lms_cms
      PAYLOAD_SECRET: local_dev_secret_change_in_production
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3001
      CORS_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://host.docker.internal:3000
      FRONTEND_REVALIDATE_URL: http://host.docker.internal:3000/api/revalidate
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-local_revalidate_secret}
      S3_BUCKET: lms-media
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: auto
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lmspass
      POSTGRES_DB: lms_cms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms_cms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
